# =============================================================================
# SehatSaathi-AI — Docker Compose (development)
#
# Usage:
#   docker compose up --build       # start all services
#   docker compose down             # stop
#   docker compose logs -f backend  # tail logs
# =============================================================================

services:

  # ── Backend (FastAPI) ─────────────────────────────────────────────────── #
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sehat_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sehat_data:/app/data
      - sehat_logs:/app/logs
    environment:
      ENV: development
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://sehat:saathi@db:5432/sehat_saathi
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React + Vite dev server) ────────────────────────────────── #
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sehat_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  # ── Nginx (reverse proxy) ─────────────────────────────────────────────── #
  nginx:
    image: nginx:1.27-alpine
    container_name: sehat_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── PostgreSQL ────────────────────────────────────────────────────────── #
  db:
    image: postgres:16-alpine
    container_name: sehat_db
    environment:
      POSTGRES_USER:     sehat
      POSTGRES_PASSWORD: saathi
      POSTGRES_DB:       sehat_saathi
    ports:
      - "5432:5432"
    volumes:
      - sehat_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehat -d sehat_saathi"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ─────────────────────────────────────────────────────────────── #
  redis:
    image: redis:7-alpine
    container_name: sehat_redis
    ports:
      - "6379:6379"
    volumes:
      - sehat_redis:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  sehat_data:
  sehat_logs:
  sehat_postgres:
  sehat_redis:
